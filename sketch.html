                                    <h4 class="text-xs font-bold text-slate-200">Снижение сырьевой экспозиции</h4>
                                    <p class="text-[11px] text-slate-400 mt-1">Последовательное замещение нефтегазовых валютных доходов казначейства через стимулирование несырьевого экспорта.</p>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <h3 class="text-base font-bold font-display text-brand-orange uppercase tracking-wider">Стабильность ДКП</h3>
                            <div class="p-4 rounded-xl liquid-inner-card flex items-start gap-3">
                                <span class="h-6 w-6 rounded bg-brand-orange/10 flex items-center justify-center text-brand-orange mt-0.5 text-xs">03</span>
                                <div>
                                    <h4 class="text-xs font-bold text-slate-200">Инфляционный контроль</h4>
                                    <p class="text-[11px] text-slate-400 mt-1">Откат инфляционного давления к долгосрочной цели ЦБ в 4% позволит нормализовать кредитный цикл.</p>
                                </div>
                            </div>
                            <div class="p-4 rounded-xl liquid-inner-card flex items-start gap-3">
                                <span class="h-6 w-6 rounded bg-brand-purple/10 flex items-center justify-center text-brand-purple mt-0.5 text-xs">04</span>
                                <div>
                                    <h4 class="text-xs font-bold text-slate-200">Демографическая опора</h4>
                                    <p class="text-[11px] text-slate-400 mt-1">Поддержка притока качественных трудовых ресурсов из дружественных регионов и ускоренная автоматизация производств.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `,
                initChart: () => {
                    // No charts on this text slide
                }
            }
        ];

        // ===== APP STATE =====
        let currentSlideIndex = 0;
        let viewMode = 'ppt'; // 'ppt' or 'scroll'
        let chartInstances = {};
        let isDarkMode = true;
        let isAutoplayActive = false;
        let autoplayTimer = null;
        const AUTOPLAY_INTERVAL = 8000; // 8 seconds per slide
        let autoplayStartTime = 0;

        // ===== STREAMING_CHUNK:Preparing theme manager... =====
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                isDarkMode = false;
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                isDarkMode = true;
                localStorage.theme = 'dark';
            }
            updateChartThemes();
        }

        function getChartOptions(title) {
            const gridColor = isDarkMode ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.08)';
            const textColor = isDarkMode ? '#86868b' : '#1d1d1f';
            
            return {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: textColor,
                            font: { family: 'Inter', size: 10 }
                        }
                    },
                    title: {
                        display: title ? true : false,
                        text: title,
                        color: isDarkMode ? '#f5f5f7' : '#1d1d1f',
                        font: { family: 'Plus Jakarta Sans', size: 12, weight: '600' }
                    }
                },
                scales: {
                    x: {
                        grid: { color: gridColor },
                        ticks: { color: textColor, font: { family: 'Inter', size: 9 } }
                    },
                    y: {
                        grid: { color: gridColor },
                        ticks: { color: textColor, font: { family: 'Inter', size: 9 } }
                    }
                }
            }
        }

        function updateChartThemes() {
            Object.keys(chartInstances).forEach(id => {
                const chart = chartInstances[id];
                if (chart) {
                    const gridColor = isDarkMode ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.08)';
                    const textColor = isDarkMode ? '#86868b' : '#1d1d1f';
                    const titleColor = isDarkMode ? '#f5f5f7' : '#1d1d1f';

                    if (chart.options.scales) {
                        Object.keys(chart.options.scales).forEach(scaleId => {
                            if (chart.options.scales[scaleId].grid) {
                                chart.options.scales[scaleId].grid.color = gridColor;
                            }
                            if (chart.options.scales[scaleId].ticks) {
                                chart.options.scales[scaleId].ticks.color = textColor;
                            }
                        });
                    }
                    if (chart.options.plugins) {
                        if (chart.options.plugins.legend && chart.options.plugins.legend.labels) {
                            chart.options.plugins.legend.labels.color = textColor;
                        }
                        if (chart.options.plugins.title) {
                            chart.options.plugins.title.color = titleColor;
                        }
                    }
                    chart.update();
                }
            });
        }

        function buildSlidesMenu() {
            const menuContainer = document.getElementById('ppt-slides-menu');
            const mobileSelector = document.getElementById('mobile-slide-selector');
            menuContainer.innerHTML = '';
            mobileSelector.innerHTML = '';

            slidesData.forEach((slide, idx) => {
                // Left desktop sidebar buttons
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded-xl text-xs font-semibold flex items-center justify-between transition-all ${idx === currentSlideIndex ? 'text-brand-blue bg-white/10 shadow-sm' : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'}`;
                btn.onclick = () => goToSlide(idx);
                btn.innerHTML = `
                    <span class="truncate block max-w-[190px]">${idx + 1}. ${slide.title}</span>
                    <i class="fa-solid fa-chevron-right text-[9px] opacity-70"></i>
                `;
                menuContainer.appendChild(btn);

                // Mobile select items
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `${idx + 1}. ${slide.topic}`;
                if (idx === currentSlideIndex) opt.selected = true;
                mobileSelector.appendChild(opt);
            });
        }

        function initChartInstance(id, config) {
            const ctx = document.getElementById(id);
            if (!ctx) return;
            if (chartInstances[id]) {
                chartInstances[id].destroy();
            }
            chartInstances[id] = new Chart(ctx, config);
        }

        function renderCurrentSlide() {
            const slide = slidesData[currentSlideIndex];
            if (!slide) return;

            // Reset Autoplay visual bar
            stopAutoplayTimer();

            // Populate Slide Elements
            document.getElementById('slide-topic').textContent = slide.topic;
            document.getElementById('slide-index-counter').textContent = `${String(currentSlideIndex + 1).padStart(2, '0')} / ${String(slidesData.length).padStart(2, '0')}`;
            
            // Re-render main dynamic content
            const contentBox = document.getElementById('slide-content');
            contentBox.innerHTML = `
                <div class="mb-4">
                    <h2 class="text-2xl font-extrabold font-display tracking-tight text-slate-800 dark:text-slate-100">${slide.title}</h2>
                    <p class="text-xs text-slate-400 dark:text-slate-500 font-medium mt-1">${slide.subtitle}</p>
                </div>
                <div class="flex-1">${slide.render()}</div>
            `;

            // Initialize respective Slide Chart
            setTimeout(() => {
                slide.initChart();
                updateChartThemes();
                if (isAutoplayActive) {
                    startAutoplayTimer();
                }
            }, 100);

            // Update UI Menu Selected State
            buildSlidesMenu();
        }

        function goToSlide(n) {
            if (n >= 0 && n < slidesData.length) {
                currentSlideIndex = n;
                renderCurrentSlide();
            }
        }

        function nextSlide() {
            if (currentSlideIndex < slidesData.length - 1) {
                goToSlide(currentSlideIndex + 1);
            } else {
                goToSlide(0); // Wrap around
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                goToSlide(currentSlideIndex - 1);
            } else {
                goToSlide(slidesData.length - 1); // Wrap around
            }
        }

        // ===== STREAMING_CHUNK:Implementing view modes & autoplay =====
        function setViewMode(mode) {
            viewMode = mode;
            const pptBtn = document.getElementById('btn-mode-ppt');
            const scrollBtn = document.getElementById('btn-mode-scroll');
            const pptLayout = document.getElementById('ppt-view');
            const scrollLayout = document.getElementById('scroll-view');

            if (mode === 'ppt') {
                pptLayout.classList.remove('hidden');
                scrollLayout.classList.add('hidden');
                
                pptBtn.className = "px-3.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-brand-blue bg-white dark:bg-slate-700 shadow-sm";
                scrollBtn.className = "px-3.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200";
                
                renderCurrentSlide();
            } else {
                pptLayout.classList.add('hidden');
                scrollLayout.classList.remove('hidden');
                
                scrollBtn.className = "px-3.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-brand-blue bg-white dark:bg-slate-700 shadow-sm";
                pptBtn.className = "px-3.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200";
                
                renderLandingMode();
            }
        }

        function renderLandingMode() {
            const landingContainer = document.getElementById('scroll-view');
            landingContainer.innerHTML = '';

            slidesData.forEach((slide, idx) => {
                const section = document.createElement('section');
                section.className = "liquid-card rounded-3xl p-8 flex flex-col gap-6 relative overflow-hidden shadow-2xl";
                section.innerHTML = `
                    <div class="flex items-center justify-between border-b border-white/[0.06] pb-4">
                        <span class="text-[10px] font-bold tracking-widest text-brand-blue uppercase">${slide.topic}</span>
                        <span class="text-xs text-slate-500 font-semibold font-display">Слайд ${idx + 1}</span>
                    </div>
                    <div>
                        <h2 class="text-2xl font-extrabold font-display tracking-tight text-slate-800 dark:text-slate-100">${slide.title}</h2>
                        <p class="text-xs text-slate-400 font-medium mt-1">${slide.subtitle}</p>
                    </div>
                    <div class="flex-1">${slide.render()}</div>
                `;
                landingContainer.appendChild(section);

                // Run charts initialization with slight delay
                setTimeout(() => {
                    slide.initChart();
                    updateChartThemes();
                }, 150);
            });
        }

        // Autoplay Logic
        let autoplayProgressTimer = null;
        function toggleAutoplay() {
            isAutoplayActive = !isAutoplayActive;
            const btn = document.getElementById('autoplay-btn');
            if (isAutoplayActive) {
                btn.innerHTML = `<i class="fa-solid fa-pause text-brand-red"></i> Стоп`;
                btn.classList.add('text-brand-red');
                startAutoplayTimer();
            } else {
                btn.innerHTML = `<i class="fa-solid fa-play"></i> Автослайд`;
                btn.classList.remove('text-brand-red');
                stopAutoplayTimer();
            }
        }

        function startAutoplayTimer() {
            stopAutoplayTimer();
            autoplayStartTime = Date.now();
            const progressBar = document.getElementById('autoplay-progress');
            
            autoplayProgressTimer = setInterval(() => {
                const elapsed = Date.now() - autoplayStartTime;
                const pct = Math.min((elapsed / AUTOPLAY_INTERVAL) * 100, 100);
                progressBar.style.width = `${pct}%`;
                
                if (elapsed >= AUTOPLAY_INTERVAL) {
                    nextSlide();
                }
            }, 100);
        }

        function stopAutoplayTimer() {
            clearInterval(autoplayProgressTimer);
            document.getElementById('autoplay-progress').style.width = '0%';
        }

        // Full Screen Toggle
        function toggleFullScreen() {
            const elem = document.getElementById('slide-wrapper');
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.log(`Error enabling full-screen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // ===== STREAMING_CHUNK:Setting up detailed informational modals... =====
        function openInteractiveData() {
            const modalBody = document.getElementById('modal-body-container');
            
            let matrixHtml = `
                <div class="mb-6">
                    <h3 class="text-xl font-extrabold tracking-tight font-display text-slate-100">Сводная матрица макроэкономических данных России</h3>
                    <p class="text-xs text-slate-400 mt-1">Официальные показатели и консенсус-прогнозы с 1990 по 2030 годы.</p>
                </div>
                <div class="overflow-x-auto rounded-xl border border-white/[0.08] max-h-[50vh]">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead class="bg-slate-800/80 text-slate-400 sticky top-0 backdrop-blur">
                            <tr>
                                <th class="p-3 border-b border-white/[0.08]">Год</th>
                                <th class="p-3 border-b border-white/[0.08]">ВВП (%)</th>
                                <th class="p-3 border-b border-white/[0.08]">Инфляция (%)</th>
                                <th class="p-3 border-b border-white/[0.08]">Курс USD</th>
                                <th class="p-3 border-b border-white/[0.08]">Brent ($)</th>
                                <th class="p-3 border-b border-white/[0.08]">Бюджет (% ВВП)</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/[0.04] text-slate-300">
            `;

            years.forEach((yr, i) => {
                const vvpVal = gdp[i] !== null ? gdp[i].toFixed(1) + '%' : '—';
                const cpiVal = cpi[i] !== null ? cpi[i].toFixed(1) + '%' : '—';
                const rateVal = rate[i] !== null ? rate[i].toFixed(1) + '%' : '—';
                const rubVal = rub[i] !== null ? rub[i].toFixed(1) : '—';
                const brentVal = oil[i] !== null ? oil[i].toFixed(1) : '—';
                const fiscVal = fiscal[i] !== null ? fiscal[i].toFixed(1) + '%' : '—';

                // Highlighting anomalous epochs
                let rowClass = "";
                if (gdp[i] < -3) rowClass = "bg-red-500/5";
                else if (gdp[i] > 5) rowClass = "bg-emerald-500/5";

                matrixHtml += `
                    <tr class="${rowClass} hover:bg-white/[0.02]">
                        <td class="p-2.5 font-bold">${yr}</td>
                        <td class="p-2.5 ${gdp[i] < 0 ? 'text-brand-red' : 'text-brand-green'}">${vvpVal}</td>
                        <td class="p-2.5">${cpiVal}</td>
                        <td class="p-2.5">${rubVal}</td>
                        <td class="p-2.5 text-brand-orange">${brentVal}</td>
                        <td class="p-2.5">${fiscVal}</td>
                    </tr>
                `;
            });

            matrixHtml += `
                        </tbody>
                    </table>
                </div>
            `;

            modalBody.innerHTML = matrixHtml;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        // Card Details modal
        function openKPIModal(metricName) {
            const modalBody = document.getElementById('modal-body-container');
            let content = "";
            
            if (metricName === 'ВВП') {
                content = `
                    <div class="mb-4">
                        <h3 class="text-xl font-bold font-display text-slate-100">Валовой внутренний продукт (ВВП)</h3>
                        <p class="text-xs text-slate-400 mt-1">Детализированная аналитика динамики производства товаров и услуг.</p>
                    </div>
                    <div class="text-xs leading-relaxed space-y-3 text-slate-300">
                        <p>Российский ВВП пережил несколько критических моментов:</p>
                        <ul class="list-disc pl-5 space-y-1">
                            <li><strong>Транзитный коллапс 1990-1994:</strong> спад в совокупности превысил 40%.</li>

                    </div>
                `;

                    <div class="text-xs leading-relaxed space-y-3 text-slate-300">

                        <ul class="list-disc pl-5 space-y-1">

                    </div>
                `;
            } else if (metricName === 'Инфляция') {
                content = `
                    <div class="mb-4">
                        <h3 class="text-xl font-bold font-display text-slate-100">Индекс потребительских цен (ИПЦ)</h3>
                        <p class="text-xs text-slate-400 mt-1">Рост инфляционного давления и механизмы его таргетирования.</p>
                    </div>
                    <div class="text-xs leading-relaxed space-y-3 text-slate-300">
                        <p>Инфляционная спираль в России:</p>
                        <ul class="list-disc pl-5 space-y-1">
                            <li>Стабилизирована к 2017 году на целевом уровне 4% с внедрением плавающего курса и инфляционного таргетирования.</li>
                            <li>Новые шоки предложения 2022 года привели к новому росту цен. Текущая цель ЦБ — долгосрочное возвращение к таргету в районе 4.0-4.5%.</li>

            modalBody.innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        // ===== KEYBOARD & SWIPE GESTURES =====
        document.addEventListener('keydown', e => {
            if (viewMode !== 'ppt') return;
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Touch Gestures for mobile
        let touchstartX = 0;
        let touchendX = 0;
        
        function handleGesture() {
            if (viewMode !== 'ppt') return;
            if (touchendX < touchstartX - 60) nextSlide();
            if (touchendX > touchstartX + 60) prevSlide();
        }

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        });

        // ===== INITIALIZATION =====
        window.onload = function() {
            // Apply localStorage theme if present
            if (localStorage.theme === 'light') {
                document.documentElement.classList.remove('dark');
                isDarkMode = false;
            } else {
                document.documentElement.classList.add('dark');
                isDarkMode = true;
            }

            renderCurrentSlide();
            console.log('✅ Премиальная интерактивная макропрезентация успешно инициализирована.');
        };
    </script>
