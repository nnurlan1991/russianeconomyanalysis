        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"

    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: 'var(--brand-blue)',
                            green: 'var(--brand-green)',
                            red: 'var(--brand-red)',
                            orange: 'var(--brand-orange)',
                            yellow: 'var(--brand-yellow)',
                            purple: 'var(--brand-purple)',
                            darkBg: '#0A0A0C',
                            lightBg: '#F5F5F7'
                        }
                    },
                    animation: {
                        'blob': 'blob 15s infinite alternate ease-in-out',
                        'blob-reverse': 'blob-reverse 20s infinite alternate ease-in-out',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(40px, -60px) scale(1.15)' },
                            '66%': { transform: 'translate(-30px, 40px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        'blob-reverse': {
                            '0%': { transform: 'translate(0px, 0px) scale(1.1)' },
                            '50%': { transform: 'translate(-50px, 50px) scale(0.85)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>

            border-color: rgba(0, 0, 0, 0.04) !important;

            background: var(--slide-bg);
            backdrop-filter: blur(24px) saturate(190%);

            background: var(--card-bg);

            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);

            transition: all 0.3s ease;
            fill-opacity: 0.1;

            stroke: #2997ff !important;
            stroke-width: 3px !important;
            filter: drop-shadow(0 0 8px rgba(41, 151, 255, 0.6));

            fill: #2997ff !important;
            fill-opacity: 0.4 !important;

            stroke: #ff9f0a !important;
            stroke-width: 3px !important;
            filter: drop-shadow(0 0 8px rgba(255, 159, 10, 0.6));
        }

        .highlight-rate .part-brake-fill {
            fill: #ff9f0a !important;
            fill-opacity: 0.4 !important;
        }

        .highlight-cpi .part-temp {
            stroke: #ff453a !important;
            stroke-width: 3px !important;
            filter: drop-shadow(0 0 8px rgba(255, 69, 58, 0.6));
        }

        .highlight-cpi .part-temp-fill {
            fill: #ff453a !important;
            fill-opacity: 0.4 !important;

            stroke: #30d158 !important;
            stroke-width: 3px !important;
            filter: drop-shadow(0 0 8px rgba(48, 209, 88, 0.6));

</head>

<body class="font-sans antialiased overflow-x-hidden min-h-screen relative flex flex-col justify-between">

                                { label: 'Базовый', data: [4.92, 0.98, 1.09, 1.09, 1.0, 1.0, 1.0], borderColor: '#2997ff', borderWidth: 3.5, fill: false, tension: 0.15 },

                        options: getChartOptions('Прогнозы изменения ВВП РФ до 2030 года (%)')

            }
        ];

        // App States
        let currentSlideIndex = 0;
        let viewMode = 'ppt';
        let chartInstances = {};
        let isDarkMode = true;
        let isAutoplayActive = false;
        let autoplayTimer = null;
        let autoplayStartTime = 0;
        const AUTOPLAY_INTERVAL = 9000; // 9 seconds per slide

        // Theme Manager
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                isDarkMode = false;
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                html.classList.remove('light');
                isDarkMode = true;
                localStorage.setItem('theme', 'dark');
            }
            updateChartThemes();
            // Re-render active slide elements
            if (viewMode === 'ppt') {
                renderCurrentSlide();
            } else {
                renderLandingMode();
            }
        }

        function getChartOptions(title) {
            const gridColor = isDarkMode ? 'rgba(255, 255, 255, 0.06)' : 'rgba(0, 0, 0, 0.06)';
            const textColor = isDarkMode ? '#86868b' : '#475569';
            const titleColor = isDarkMode ? '#f5f5f7' : '#1d1d1f';

            return {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: textColor,
                            font: { family: 'Inter', size: 10, weight: '500' }
                        }
                    },
                    title: {
                        display: title ? true : false,
                        text: title,
                        color: titleColor,
                        font: { family: 'Plus Jakarta Sans', size: 12, weight: '700' }
                    }
                },
                scales: {
                    x: {
                        grid: { color: gridColor },
                        ticks: { color: textColor, font: { family: 'Inter', size: 9 } }
                    },
                    y: {
                        grid: { color: gridColor },
                        ticks: { color: textColor, font: { family: 'Inter', size: 9 } }
                    }
                }
            }
        }

        function updateChartThemes() {
            Object.keys(chartInstances).forEach(id => {
                const chart = chartInstances[id];
                if (chart) {
                    const gridColor = isDarkMode ? 'rgba(255, 255, 255, 0.06)' : 'rgba(0, 0, 0, 0.06)';
                    const textColor = isDarkMode ? '#86868b' : '#475569';
                    const titleColor = isDarkMode ? '#f5f5f7' : '#1d1d1f';

                    if (chart.options.scales) {
                        Object.keys(chart.options.scales).forEach(scaleId => {
                            if (chart.options.scales[scaleId].grid) {
                                chart.options.scales[scaleId].grid.color = gridColor;
                            }
                            if (chart.options.scales[scaleId].ticks) {
                                chart.options.scales[scaleId].ticks.color = textColor;
                            }
                        });
                    }
                    if (chart.options.plugins) {
                        if (chart.options.plugins.legend && chart.options.plugins.legend.labels) {
                            chart.options.plugins.legend.labels.color = textColor;
                        }
                        if (chart.options.plugins.title) {
                            chart.options.plugins.title.color = titleColor;
                        }
                    }

                    // Dynamic colors for datasets
                    const red = isDarkMode ? '#ff453a' : '#d70015';
                    const green = isDarkMode ? '#30d158' : '#1d883b';
                    const orange = isDarkMode ? '#ff9f0a' : '#bf4f00';
                    const blue = isDarkMode ? '#2997ff' : '#0071e3';
                    const purple = isDarkMode ? '#bf5af2' : '#8600d9';

                    if (id === 'ch_gdp') {
                        chart.data.datasets[0].backgroundColor = dataGDP.map(v => v < 0 ? red : v > 3.5 ? green : orange);
                    } else if (id === 'ch_cpi') {
                        chart.data.datasets[0].borderColor = red;
                    } else if (id === 'ch_cpi_m') {
                        chart.data.datasets[0].backgroundColor = orange;
                    } else if (id === 'ch_rate') {
                        chart.data.datasets[0].borderColor = orange;
                    } else if (id === 'ch_rub') {
                        chart.data.datasets[0].borderColor = blue;
                    } else if (id === 'ch_unemp') {
                        chart.data.datasets[0].borderColor = purple;
                        chart.data.datasets[0].backgroundColor = isDarkMode ? 'rgba(191, 90, 242, 0.08)' : 'rgba(134, 0, 217, 0.06)';
                    } else if (id === 'ch_oil_gdp') {
                        chart.data.datasets[0].backgroundColor = green;
                        chart.data.datasets[1].borderColor = orange;
                    } else if (id === 'ch_2014') {
                        chart.data.datasets[0].borderColor = green;
                        chart.data.datasets[1].borderColor = red;
                        chart.data.datasets[2].borderColor = blue;
                    } else if (id === 'ch_scenario') {
                        chart.data.datasets[0].borderColor = blue;
                        chart.data.datasets[1].borderColor = green;
                        chart.data.datasets[2].borderColor = red;
                    }

                    chart.update();
                }
            });
        }

        function buildSlidesMenu() {
            const menuContainer = document.getElementById('ppt-slides-menu');
            const mobileSelector = document.getElementById('mobile-slide-selector');
            menuContainer.innerHTML = '';
            mobileSelector.innerHTML = '';

            slidesData.forEach((slide, idx) => {
                // Desktop sidebar links
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded-xl text-xs font-semibold flex items-center justify-between transition-all ${idx === currentSlideIndex ? 'ppt-menu-btn-active shadow-sm font-display' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200/40 dark:hover:bg-white/5 font-display'}`;
                btn.onclick = () => goToSlide(idx);
                btn.innerHTML = `
                    <span class="truncate block max-w-[190px] font-display">${idx + 1}. ${slide.title}</span>
                    <i class="fa-solid fa-chevron-right text-[8px] opacity-60"></i>
                `;
                menuContainer.appendChild(btn);

                // Mobile select items
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `${idx + 1}. ${slide.topic}`;
                if (idx === currentSlideIndex) opt.selected = true;
                mobileSelector.appendChild(opt);
            });
        }

        function initChartInstance(id, config) {
            const ctx = document.getElementById(id);
            if (!ctx) return;
            if (chartInstances[id]) {
                chartInstances[id].destroy();
            }
            chartInstances[id] = new Chart(ctx, config);
        }

        function renderCurrentSlide() {
            const slide = slidesData[currentSlideIndex];
            if (!slide) return;

            stopAutoplayTimer();

            document.getElementById('slide-topic').textContent = slide.topic;
            document.getElementById('slide-index-counter').textContent = `${String(currentSlideIndex + 1).padStart(2, '0')} / ${String(slidesData.length).padStart(2, '0')}`;

            const contentBox = document.getElementById('slide-content');
            contentBox.innerHTML = `
                <div class="mb-4">
                    <h2 class="text-2xl font-extrabold font-display tracking-tight text-slate-800 dark:text-slate-100">${slide.title}</h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400 font-medium mt-1 font-sans">${slide.subtitle}</p>
                </div>
                <div class="flex-1 flex flex-col justify-between">${slide.render()}</div>
            `;

            setTimeout(() => {
                slide.initChart();
                updateChartThemes();
                if (isAutoplayActive) {
                    startAutoplayTimer();
                }
            }, 120);

            buildSlidesMenu();
        }

        function goToSlide(n) {
            if (n >= 0 && n < slidesData.length) {
                currentSlideIndex = n;
                renderCurrentSlide();
            }
        }

        function nextSlide() {
            if (currentSlideIndex < slidesData.length - 1) {
                goToSlide(currentSlideIndex + 1);
            } else {
                goToSlide(0);
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                goToSlide(currentSlideIndex - 1);
            } else {
                goToSlide(slidesData.length - 1);
            }
        }

        // View Modes Setup
        function setViewMode(mode) {
            viewMode = mode;
            const pptBtn = document.getElementById('btn-mode-ppt');
            const scrollBtn = document.getElementById('btn-mode-scroll');
            const pptLayout = document.getElementById('ppt-view');
            const scrollLayout = document.getElementById('scroll-view');

            if (mode === 'ppt') {
                pptLayout.classList.remove('hidden');
                scrollLayout.classList.add('hidden');

                pptBtn.className = "px-4 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-brand-blue bg-white dark:bg-slate-700 shadow-sm";
                scrollBtn.className = "px-4 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200";

                renderCurrentSlide();
            } else {
                pptLayout.classList.add('hidden');
                scrollLayout.classList.remove('hidden');

                scrollBtn.className = "px-4 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-brand-blue bg-white dark:bg-slate-700 shadow-sm";
                pptBtn.className = "px-4 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200";

                renderLandingMode();
            }
        }

        function renderLandingMode() {
            const landingContainer = document.getElementById('scroll-view');
            landingContainer.innerHTML = '';

            slidesData.forEach((slide, idx) => {
                const section = document.createElement('section');
                section.className = "liquid-card rounded-3xl p-6 lg:p-8 flex flex-col gap-5 relative overflow-hidden shadow-2xl";
                section.innerHTML = `
                    <div class="flex items-center justify-between border-b border-white/[0.08] dark:border-white/[0.04] pb-3 mb-2">

                        <p class="text-xs text-slate-500 dark:text-slate-400 font-medium mt-1">${slide.subtitle}</p>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">${slide.render()}</div>
                `;
                landingContainer.appendChild(section);

                setTimeout(() => {
                    slide.initChart();
                    updateChartThemes();
                }, 150);
            });
        }

        // Autoplay Logic
        let autoplayProgressTimer = null;
        function toggleAutoplay() {
            isAutoplayActive = !isAutoplayActive;
            const btn = document.getElementById('autoplay-btn');
            if (isAutoplayActive) {
                btn.innerHTML = `<i class="fa-solid fa-pause text-brand-red"></i> Стоп`;
                btn.classList.add('text-brand-red');
                startAutoplayTimer();
            } else {
                btn.innerHTML = `<i class="fa-solid fa-play"></i> Автослайд`;
                btn.classList.remove('text-brand-red');
                stopAutoplayTimer();
            }
        }

        function startAutoplayTimer() {
            stopAutoplayTimer();
            autoplayStartTime = Date.now();
            const progressBar = document.getElementById('autoplay-progress');

            autoplayProgressTimer = setInterval(() => {
                const elapsed = Date.now() - autoplayStartTime;
                const pct = Math.min((elapsed / AUTOPLAY_INTERVAL) * 100, 100);
                progressBar.style.width = `${pct}%`;

                if (elapsed >= AUTOPLAY_INTERVAL) {
                    nextSlide();
                }
            }, 100);
        }

        function stopAutoplayTimer() {
            clearInterval(autoplayProgressTimer);
            const progressBar = document.getElementById('autoplay-progress');
            if (progressBar) {
                progressBar.style.width = '0%';
            }
        }

        // Full Screen mode helper
        function toggleFullScreen() {
            const elem = document.getElementById('slide-wrapper');
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.log(`FullScreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

                content = `
                    <div class="mb-4 text-slate-800 dark:text-slate-200">
                        <h3 class="text-xl font-bold font-display text-brand-red">Индекс потребительских цен (ИПЦ / Инфляция)</h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Динамика цен и инфляционные ожидания участников.</p>
                    </div>
                    <div class="text-xs leading-relaxed space-y-3 text-slate-600 dark:text-slate-300">
                        <p>Процессы ценовой дестабилизации:</p>
                        <ul class="list-disc pl-5 space-y-1.5">
                            <li>Гиперинфляция 1992 года (2508%) полностью обесценила накопления плановой эпохи.</li>
                            <li>Стабилизация была достигнута к 2017 году на отметке 4% благодаря запуску инфляционного таргетирования и отмене дорогих интервенций рубля.</li>
                            <li>Текущие вызовы (8.40% в 2024 году) требуют последовательной и затяжной жесткой монетарной политики для предотвращения раскручивания спирали.</li>
                        </ul>
                    </div>
                `;
            }

            modalBody.innerHTML = content;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Keyboard arrows & Swipe nav
        document.addEventListener('keydown', e => {
            if (viewMode !== 'ppt') return;
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'Escape') {
                closeModal();
            }
        });

        let touchstartX = 0;
        let touchendX = 0;

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (viewMode !== 'ppt') return;
            if (touchendX < touchstartX - 60) nextSlide();
            if (touchendX > touchstartX + 60) prevSlide();
        });

        // App Initialization
        window.onload = function () {
            // Apply storage theme preference
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
                isDarkMode = false;
            } else {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
                isDarkMode = true;
            }

            renderCurrentSlide();
            console.log('✅ Премиальная макроэкономическая презентация успешно развернута.');
        };
    </script>
</body>

</html>
